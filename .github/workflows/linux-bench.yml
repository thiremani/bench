name: Linux Benchmarks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout bench
        uses: actions/checkout@v4

      - name: Checkout Pluto
        uses: actions/checkout@v4
        with:
          repository: thiremani/pluto
          path: pluto
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: pluto/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: "1.94.0"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12.5"

      - name: Install Python benchmark deps
        run: |
          python3 -m pip install --break-system-packages --user numpy==2.4.4

      - name: Install LLVM 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            git \
            gnupg2 \
            libc6-dev \
            libcurl4-openssl-dev \
            libedit2 \
            libgcc-13-dev \
            libncurses-dev \
            libpython3-dev \
            libsqlite3-0 \
            libstdc++-13-dev \
            libxml2-dev \
            libz3-dev \
            pkg-config \
            tzdata \
            unzip \
            zip \
            zlib1g-dev \
            llvm-21-dev \
            lld-21 \
            clang-21
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-21 100
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-21 100

      - name: Set LLVM environment
        run: |
          echo "LLVM_BIN_DIR=/usr/lib/llvm-21/bin" >> "$GITHUB_ENV"
          echo "CGO_CFLAGS=-I/usr/lib/llvm-21/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L/usr/lib/llvm-21/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-21/lib" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-21/bin" >> "$GITHUB_PATH"

      - name: Install Swift 6.2.4
        run: |
          SWIFT_VERSION=6.2.4
          SWIFT_PLATFORM=ubuntu24.04
          SWIFT_ARCHIVE=swift-${SWIFT_VERSION}-RELEASE-${SWIFT_PLATFORM}.tar.gz
          SWIFT_URL=https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/${SWIFT_ARCHIVE}

          wget -q "${SWIFT_URL}"
          tar xzf "${SWIFT_ARCHIVE}"
          echo "${PWD}/swift-${SWIFT_VERSION}-RELEASE-${SWIFT_PLATFORM}/usr/bin" >> "$GITHUB_PATH"

      - name: Install Zig 0.15.2
        run: |
          ZIG_VERSION=0.15.2
          ZIG_ARCHIVE=zig-x86_64-linux-${ZIG_VERSION}.tar.xz
          ZIG_URL=https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}

          wget -q "${ZIG_URL}"
          tar xf "${ZIG_ARCHIVE}"
          echo "${PWD}/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Reassert LLVM 21 toolchain precedence
        run: |
          # Swift ships its own clang/lld; keep the benchmark and Pluto build on
          # the same LLVM toolchain we installed above.
          echo "$LLVM_BIN_DIR" >> "$GITHUB_PATH"

      - name: Build Pluto
        working-directory: pluto
        run: go build -o pluto

      - name: Verify toolchain
        run: |
          python3 --version
          python3 -c "import numpy as np; print(f'NumPy {np.__version__}')"
          cc --version | head -n 1
          c++ --version | head -n 1
          swift --version
          swiftc --version
          go version
          rustc --version
          zig version
          node --version
          bun --version
          julia --version
          pluto/pluto -version
          which clang
          clang --version | head -n 1
          which ld.lld
          ld.lld --version | head -n 1
          which opt
          opt --version | head -n 1
          which llc
          llc --version | head -n 1

      - name: Run Linux benchmark suite
        run: |
          python3 -u scripts/benchmark.py \
            --repeat 10 \
            --pluto pluto/pluto \
            --snapshot-dir results/linux-gha

      - name: Write job summary
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          snapshot = Path("results/linux-gha/results.json")
          data = json.loads(snapshot.read_text(encoding="utf-8"))
          metadata = data.get("metadata", {})
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          def compile_text(value):
              return "-" if value is None else f"{value:.3f}"

          def short_commit(value):
              return "unknown" if not value else value[:12]

          def branch_label(repo):
              if not repo:
                  return "unknown"
              branch = repo.get("git_branch") or "detached"
              return f"{branch}{' dirty' if repo.get('git_dirty') else ''}"

          def memory_text(value):
              if value is None:
                  return "unknown RAM"
              gib = value / (1024.0 * 1024.0)
              return f"{gib:.1f} GiB RAM"

          with summary.open("a", encoding="utf-8") as out:
              out.write("## Linux benchmark snapshot\n\n")
              out.write(f"- Platform: `{data['platform']}`\n")
              out.write(f"- Machine: `{data['machine']}`\n")
              out.write(f"- Repeat: `{data['repeat']}`\n")
              out.write(f"- Pluto binary: `{data['pluto_bin']}`\n\n")

              host = metadata.get("host", {})
              bench = metadata.get("bench", {})
              pluto = metadata.get("pluto", {})
              memory = metadata.get("memory_measurement", {})
              target_policy = metadata.get("target_policy", {})
              llvm = metadata.get("llvm_tools", {})

              out.write("### Provenance\n\n")
              out.write(
                  f"- Bench: `{branch_label(bench)}` @ `{short_commit(bench.get('git_commit'))}`\n"
              )
              out.write(
                  f"- Pluto: `{pluto.get('version', 'unknown')}` on `{branch_label(pluto)}` @ "
                  f"`{short_commit(pluto.get('git_commit'))}`\n"
              )
              out.write(
                  f"- Host: `{host.get('cpu_name', host.get('machine', 'unknown host'))}` | "
                  f"`{host.get('platform', data['platform'])}` | "
                  f"`{host.get('cpu_count', '?')} cores` | "
                  f"`{memory_text(host.get('total_memory_kb'))}` | "
                  f"`Python {host.get('python_version', '?')}`\n"
              )
              if memory.get("enabled"):
                  out.write(f"- Peak memory: `{memory.get('collector', 'enabled')}`\n")
              else:
                  out.write("- Peak memory: unavailable on this host\n")
              if target_policy:
                  out.write(
                      f"- Target policy: `{target_policy.get('mode', 'unknown')}`\n"
                  )
              if llvm:
                  llvm_text = " | ".join(
                      f"{name} {version}" if version else f"{name} unavailable"
                      for name, version in llvm.items()
                  )
                  out.write(f"- LLVM: `{llvm_text}`\n")
              out.write("\n")

              for case in data["cases"]:
                  out.write(f"### {case['name'].replace('_', ' ').title()}\n\n")
                  out.write("| Language | Version | Compile ms | Run ms | Output |\n")
                  out.write("| --- | --- | ---: | ---: | --- |\n")
                  for result in case["results"]:
                      out.write(
                          f"| {result['language']} | `{result['version']}` | "
                          f"{compile_text(result['compile_ms'])} | "
                          f"{result['run_ms']:.3f} | `{result['output']}` |\n"
                      )
                  out.write("\n")
          PY

      - name: Upload Linux benchmark snapshot
        uses: actions/upload-artifact@v4
        with:
          name: linux-benchmark-snapshot
          path: results/linux-gha
