<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1420" viewBox="0 0 760 1420" role="img" aria-labelledby="title desc">
<title id="title">Pluto vs Python at a glance mobile</title>
<desc id="desc">Stacked mobile-friendly source snippets for the sum and fib benchmarks in Pluto and Python, with NumPy backing the Python sum case.</desc>
<rect width="760" height="1420" fill="#f8fafc" />
<text x="28" y="42" fill="#0f172a" font-size="24" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto vs Python at a Glance</text>
<text x="28" y="66" fill="#475569" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Mobile layout: each benchmark stacks Pluto above Python for easier reading.</text>

<text x="28" y="110" fill="#0f172a" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Sum</text>
<rect x="28" y="126" width="704" height="168" rx="18" fill="#0f172a" />
<text x="48" y="156" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto</text>
<text x="48" y="176" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/sum/pluto/sum.spt</text>
<text x="48" y="214" xml:space="preserve" fill="#e2e8f0" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="214" fill="#f59e0b">i</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">1:20000001</tspan>
  <tspan x="48" y="244" fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">0</tspan>
  <tspan x="48" y="274" fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> + (</tspan><tspan fill="#f59e0b">i</tspan><tspan fill="#e2e8f0"> * </tspan><tspan fill="#38bdf8">3</tspan><tspan fill="#e2e8f0">) % </tspan><tspan fill="#38bdf8">17</tspan>
</text>

<rect x="28" y="314" width="704" height="196" rx="18" fill="#111827" />
<text x="48" y="344" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Python</text>
<text x="48" y="364" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/sum/python/main.py</text>
<text x="48" y="402" xml:space="preserve" fill="#e2e8f0" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="402">import numpy as np</tspan>
  <tspan x="48" y="426">chunk = 1_000_000</tspan>
  <tspan x="48" y="452">for start in range(1, N + 1, chunk):</tspan>
  <tspan x="72" y="478">values = np.arange(start, end, dtype=np.int32)</tspan>
  <tspan x="72" y="502">values *= 3; values %= 17</tspan>
</text>

<text x="28" y="560" fill="#0f172a" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Fib</text>
<rect x="28" y="576" width="704" height="312" rx="18" fill="#0f172a" />
<text x="48" y="606" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto</text>
<text x="48" y="626" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/fib/pluto/fib.pt + fib.spt</text>
<text x="48" y="658" fill="#38bdf8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">fib.pt</text>
<text x="48" y="690" xml:space="preserve" fill="#e2e8f0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="690" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="68" y="718" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &lt;= </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan>
  <tspan x="68" y="746" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &gt; </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">) + </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">2</tspan><tspan fill="#e2e8f0">)</tspan>
</text>
<text x="48" y="792" fill="#38bdf8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">fib.spt</text>
<text x="48" y="820" xml:space="preserve" fill="#e2e8f0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="820" fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">32</tspan><tspan fill="#e2e8f0">)</tspan>
</text>

<rect x="28" y="908" width="704" height="250" rx="18" fill="#111827" />
<text x="48" y="938" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Python</text>
<text x="48" y="958" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/fib/python/main.py</text>
<text x="48" y="1000" xml:space="preserve" fill="#e2e8f0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="1000" fill="#c084fc">def</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0">: int) -&gt; int:</tspan>
  <tspan x="78" y="1030" fill="#c084fc">if</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &lt;= </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">:</tspan>
  <tspan x="108" y="1060" fill="#c084fc">return</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan>
  <tspan x="78" y="1100" fill="#c084fc">return</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">) + </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">2</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="48" y="1140" fill="#22c55e">print</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">32</tspan><tspan fill="#e2e8f0">))</tspan>
</text>
</svg>
