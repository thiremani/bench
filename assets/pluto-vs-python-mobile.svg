<svg xmlns="http://www.w3.org/2000/svg" width="760" height="1460" viewBox="0 0 760 1460" role="img" aria-labelledby="title desc">
<title id="title">Pluto vs Python at a glance mobile</title>
<desc id="desc">Stacked mobile-friendly source snippets for the sum and fib benchmarks in Pluto and Python, with NumPy backing the Python sum case.</desc>
<rect width="760" height="1460" fill="#f8fafc" />
<text x="28" y="42" fill="#0f172a" font-size="24" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto vs Python at a Glance</text>
<text x="28" y="66" fill="#475569" font-size="14" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Mobile layout: each benchmark stacks Pluto above Python for easier reading.</text>

<text x="28" y="110" fill="#0f172a" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Sum</text>
<rect x="28" y="126" width="704" height="168" rx="18" fill="#0f172a" />
<text x="48" y="156" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto</text>
<text x="48" y="176" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/sum/pluto/sum.spt</text>
<text x="48" y="214" xml:space="preserve" fill="#e2e8f0" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="214" fill="#f59e0b">i</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">1:20000001</tspan>
  <tspan x="48" y="244" fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">0</tspan>
  <tspan x="48" y="274" fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> + (</tspan><tspan fill="#f59e0b">i</tspan><tspan fill="#e2e8f0"> * </tspan><tspan fill="#38bdf8">3</tspan><tspan fill="#e2e8f0">) % </tspan><tspan fill="#38bdf8">17</tspan>
</text>

<rect x="28" y="314" width="704" height="236" rx="18" fill="#111827" />
<text x="48" y="344" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Python + NumPy</text>
<text x="48" y="364" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/sum/python/main.py</text>
<text x="48" y="390" xml:space="preserve" fill="#e2e8f0" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="390" fill="#c084fc">import</tspan><tspan fill="#e2e8f0"> numpy </tspan><tspan fill="#c084fc">as</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">np</tspan>
  <tspan x="48" y="404" fill="#f59e0b">CHUNK_SIZE</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">1_000_000</tspan>
  <tspan x="48" y="418" fill="#f59e0b">N</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">20_000_001</tspan>
  <tspan x="48" y="432" fill="#f59e0b">total</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">0</tspan>
  <tspan x="48" y="446" fill="#c084fc">for</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">start</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#c084fc">in</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">range</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#f59e0b">N</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#f59e0b">CHUNK_SIZE</tspan><tspan fill="#e2e8f0">):</tspan>
  <tspan x="64" y="460" fill="#f59e0b">end</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#22c55e">min</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">start</tspan><tspan fill="#e2e8f0"> + </tspan><tspan fill="#f59e0b">CHUNK_SIZE</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#f59e0b">N</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="64" y="474" fill="#f59e0b">values</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">np</tspan><tspan fill="#e2e8f0">.</tspan><tspan fill="#22c55e">arange</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">start</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#f59e0b">end</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#f59e0b">dtype</tspan><tspan fill="#e2e8f0">=</tspan><tspan fill="#f59e0b">np</tspan><tspan fill="#e2e8f0">.</tspan><tspan fill="#38bdf8">int32</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="64" y="488" fill="#f59e0b">values</tspan><tspan fill="#e2e8f0"> *= </tspan><tspan fill="#38bdf8">3</tspan>
  <tspan x="64" y="502" fill="#f59e0b">values</tspan><tspan fill="#e2e8f0"> %= </tspan><tspan fill="#38bdf8">17</tspan>
  <tspan x="64" y="516" fill="#f59e0b">total</tspan><tspan fill="#e2e8f0"> += </tspan><tspan fill="#22c55e">int</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">values</tspan><tspan fill="#e2e8f0">.</tspan><tspan fill="#22c55e">sum</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">dtype</tspan><tspan fill="#e2e8f0">=</tspan><tspan fill="#f59e0b">np</tspan><tspan fill="#e2e8f0">.</tspan><tspan fill="#38bdf8">int64</tspan><tspan fill="#e2e8f0">))</tspan>
  <tspan x="48" y="530" fill="#22c55e">print</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">total</tspan><tspan fill="#e2e8f0">)</tspan>
</text>

<text x="28" y="600" fill="#0f172a" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Fib</text>
<rect x="28" y="616" width="704" height="312" rx="18" fill="#0f172a" />
<text x="48" y="646" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto</text>
<text x="48" y="666" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/fib/pluto/fib.pt + fib.spt</text>
<text x="48" y="698" fill="#38bdf8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">fib.pt</text>
<text x="48" y="730" xml:space="preserve" fill="#e2e8f0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="730" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="68" y="758" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &lt;= </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan>
  <tspan x="68" y="786" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &gt; </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">) + </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">2</tspan><tspan fill="#e2e8f0">)</tspan>
</text>
<text x="48" y="832" fill="#38bdf8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">fib.spt</text>
<text x="48" y="860" xml:space="preserve" fill="#e2e8f0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="860" fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">32</tspan><tspan fill="#e2e8f0">)</tspan>
</text>

<rect x="28" y="948" width="704" height="250" rx="18" fill="#111827" />
<text x="48" y="978" fill="#f8fafc" font-size="16" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Python</text>
<text x="48" y="998" fill="#94a3b8" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/fib/python/main.py</text>
<text x="48" y="1040" xml:space="preserve" fill="#e2e8f0" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="48" y="1040" fill="#c084fc">def</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0">: int) -&gt; int:</tspan>
  <tspan x="78" y="1070" fill="#c084fc">if</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &lt;= </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">:</tspan>
  <tspan x="108" y="1100" fill="#c084fc">return</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan>
  <tspan x="78" y="1140" fill="#c084fc">return</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">) + </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">2</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="48" y="1180" fill="#22c55e">print</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">32</tspan><tspan fill="#e2e8f0">))</tspan>
</text>
</svg>
