<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840" role="img" aria-labelledby="title desc">
<title id="title">Pluto vs Python at a glance</title>
<desc id="desc">Side by side source snippets for the sum and fib benchmarks in Pluto and Python, with NumPy backing the Python sum case.</desc>
<rect width="1200" height="840" fill="#f8fafc" />
<text x="48" y="48" fill="#0f172a" font-size="30" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto vs Python at a Glance</text>
<text x="48" y="74" fill="#475569" font-size="15" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">The same benchmark ideas, shown side by side so Pluto's template plus script model is visible at a glance.</text>

<text x="48" y="122" fill="#0f172a" font-size="20" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Sum</text>
<rect x="48" y="142" width="530" height="280" rx="18" fill="#0f172a" />
<rect x="622" y="142" width="530" height="280" rx="18" fill="#111827" />
<text x="72" y="176" fill="#f8fafc" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto</text>
<text x="72" y="198" fill="#94a3b8" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/sum/pluto/sum.spt</text>
<text x="646" y="176" fill="#f8fafc" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Python + NumPy</text>
<text x="646" y="198" fill="#94a3b8" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/sum/python/main.py</text>

<text x="72" y="242" xml:space="preserve" fill="#e2e8f0" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="72" y="242" fill="#f59e0b">i</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">1:20000001</tspan>
  <tspan x="72" y="276" fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#38bdf8">0</tspan>
  <tspan x="72" y="310" fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">sum</tspan><tspan fill="#e2e8f0"> + (</tspan><tspan fill="#f59e0b">i</tspan><tspan fill="#e2e8f0"> * </tspan><tspan fill="#38bdf8">3</tspan><tspan fill="#e2e8f0">) % </tspan><tspan fill="#38bdf8">17</tspan>
  <tspan x="72" y="344" fill="#f59e0b">sum</tspan>
</text>

<text x="646" y="236" xml:space="preserve" fill="#e2e8f0" font-size="17" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="646" y="236">import numpy as np</tspan>
  <tspan x="646" y="262">CHUNK_SIZE = 1_000_000</tspan>
  <tspan x="646" y="288">N = 20_000_001</tspan>
  <tspan x="646" y="314">for start in range(1, N, CHUNK_SIZE):</tspan>
  <tspan x="678" y="340">end = min(start + CHUNK_SIZE, N)</tspan>
  <tspan x="678" y="366">values = np.arange(start, end,</tspan>
  <tspan x="742" y="392">dtype=np.int32)</tspan>
</text>

<text x="48" y="458" fill="#0f172a" font-size="20" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Fib</text>
<rect x="48" y="478" width="530" height="294" rx="18" fill="#0f172a" />
<rect x="622" y="478" width="530" height="294" rx="18" fill="#111827" />
<text x="72" y="512" fill="#f8fafc" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Pluto</text>
<text x="72" y="534" fill="#94a3b8" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/fib/pluto/fib.pt + fib.spt</text>
<text x="646" y="512" fill="#f8fafc" font-size="18" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">Python</text>
<text x="646" y="534" fill="#94a3b8" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">benchmarks/fib/python/main.py</text>

<text x="72" y="574" fill="#38bdf8" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">fib.pt</text>
<text x="72" y="604" xml:space="preserve" fill="#e2e8f0" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="72" y="604" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="92" y="634" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &lt;= </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan>
  <tspan x="92" y="664" fill="#f59e0b">y</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &gt; </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">) + </tspan><tspan fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">2</tspan><tspan fill="#e2e8f0">)</tspan>
</text>
<text x="72" y="704" fill="#38bdf8" font-size="13" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif">fib.spt</text>
<text x="72" y="730" xml:space="preserve" fill="#e2e8f0" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="72" y="730" fill="#22c55e">Fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">32</tspan><tspan fill="#e2e8f0">)</tspan>
</text>

<text x="646" y="582" xml:space="preserve" fill="#e2e8f0" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <tspan x="646" y="582" fill="#c084fc">def</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0">: int) -&gt; int:</tspan>
  <tspan x="678" y="614" fill="#c084fc">if</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> &lt;= </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">:</tspan>
  <tspan x="710" y="646" fill="#c084fc">return</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#f59e0b">n</tspan>
  <tspan x="678" y="694" fill="#c084fc">return</tspan><tspan fill="#e2e8f0"> </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">1</tspan><tspan fill="#e2e8f0">) + </tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#f59e0b">n</tspan><tspan fill="#e2e8f0"> - </tspan><tspan fill="#38bdf8">2</tspan><tspan fill="#e2e8f0">)</tspan>
  <tspan x="646" y="742" fill="#22c55e">print</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#22c55e">fib</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#38bdf8">32</tspan><tspan fill="#e2e8f0">))</tspan>
</text>
</svg>
